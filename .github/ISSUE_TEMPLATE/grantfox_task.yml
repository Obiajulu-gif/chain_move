name: GrantFox contributor task
description: Scoped task for open-source contributors
title: "Task: "
labels: ["grantfox", "needs triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What needs to be improved?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Expected solution
      description: What should the contributor implement?
    validations:
      required: true
  - type: textarea
    id: files
    attributes:
      label: Files likely involved
      placeholder: app/..., lib/..., models/..., docs/...
  - type: dropdown
    id: difficulty
    attributes:
      label: Difficulty
      options:
        - Good first issue
        - Beginner
        - Intermediate
        - Advanced
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Documentation
        - UI/UX
        - Testing
        - Auth / Privy
        - Payments / Paystack
        - Stellar / Soroban
        - Security
        - CI / GitHub Actions
        - Backend / API
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Contributor safety
      options:
        - label: This task can be completed with mock mode or sandbox credentials.
          required: true
        - label: This task does not require maintainer-only credentials.
          required: true
