name: Feature request
description: Suggest a product or engineering improvement
title: "Feature: "
labels: ["type: feature", "needs triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / user need
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposed
    attributes:
      label: Proposed solution
      description: Describe the feature or improvement.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Frontend / UI
        - Backend / API
        - Auth / Privy
        - Payments / Paystack
        - Email / Resend
        - Stellar / Soroban
        - Admin / KYC
        - Documentation
        - Testing
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] ...
        - [ ] ...
  - type: checkboxes
    id: safety
    attributes:
      label: Safety
      options:
        - label: This can be developed without maintainer-only credentials.
          required: true
