name: Bug report
description: Report a reproducible ChainMove bug
title: "Bug: "
labels: ["type: bug", "needs triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not include private credentials.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Frontend / UI
        - Backend / API
        - Auth / Privy
        - Payments / Paystack
        - Email / Resend
        - Stellar / Soroban
        - Admin / KYC
        - CI / GitHub Actions
        - Documentation
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: OS, Node version, browser, branch, mock mode on/off
  - type: checkboxes
    id: safety
    attributes:
      label: Safety checklist
      options:
        - label: I did not include private credentials.
          required: true
